<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clean Info Overlay</title>

<style>
html, body {
    margin:0;
    padding:0;
    width:1920px;
    height:1080px;
    background: transparent;
    overflow:hidden;
}

/* CONTAINER */
.wrapper {
    position:absolute;
    top:60px;
    left:80px;
    width:1760px;
    color:white;
}

/* ICON */
.icon {
    font-size:40px;
    opacity:0;
    transform: translateY(-20px);
    transition: all 0.5s ease;
}

/* LINE */
.line {
    width:0;
    height:2px;
    background:white;
    margin:15px 0 20px 0;
    transition: width 0.8s ease;
}

/* TEXT */
.text {
    font-family: "Times New Roman", serif;
    font-size:48px;
    line-height:1.25;
    letter-spacing:1px;
    text-transform: uppercase;

    opacity:0;
    transform: translateY(-30px);
    transition: all 0.8s ease;
}

/* STATES */
.show-icon {
    opacity:1;
    transform: translateY(0);
}

.show-line {
    width:100%;
}

.show-text {
    opacity:1;
    transform: translateY(0);
}

.hide {
    opacity:0 !important;
    transform: translateY(-30px) !important;
}

</style>
</head>

<body>

<div class="wrapper">
    <div id="icon" class="icon">i</div>
    <div id="line" class="line"></div>
    <div id="text" class="text"></div>
</div>

<script>

const sections = [

"RSI SHOWS MARKET MOMENTUM. LOW VALUES SIGNAL OVERSOLD CONDITIONS WHERE PRICE MAY REACT UP, WHILE HIGH VALUES INDICATE OVERBOUGHT LEVELS AND POSSIBLE PULLBACK.",

"ORDER BOOK DISPLAYS REAL-TIME BUY AND SELL LIQUIDITY. LARGE ORDERS OFTEN ACT AS SHORT-TERM SUPPORT OR RESISTANCE LEVELS.",

"LIQUIDITY HEATMAP HIGHLIGHTS AREAS WITH HIGH ORDER CONCENTRATION. PRICE IS OFTEN DRAWN TOWARD THESE ZONES LIKE A MAGNET.",

"MICROSTRUCTURE SHOWS SHORT-TERM MARKET BEHAVIOR. IT HELPS IDENTIFY WHETHER PRICE IS TRENDING, RANGING, OR LOSING MOMENTUM.",

"FEAR AND GREED INDEX REFLECTS MARKET SENTIMENT. EXTREME FEAR MAY SIGNAL OPPORTUNITY, WHILE EXTREME GREED OFTEN PRECEDES CORRECTIONS.",

"TREND INDICATOR DEFINES MARKET DIRECTION. TRADING WITH THE TREND GENERALLY PROVIDES HIGHER PROBABILITY SETUPS.",

"VOLUME REPRESENTS MARKET PARTICIPATION. STRONG MOVES WITH HIGH VOLUME ARE MORE RELIABLE THAN LOW-VOLUME MOVEMENTS."

];

const icon = document.getElementById("icon");
const line = document.getElementById("line");
const text = document.getElementById("text");

let index = 0;

async function showSection(content){

    text.innerText = content;

    // reset
    icon.classList.remove("show-icon");
    line.classList.remove("show-line");
    text.classList.remove("show-text");

    await delay(300);

    // 1. icon
    icon.classList.add("show-icon");

    await delay(600);

    // 2. line
    line.classList.add("show-line");

    await delay(600);

    // 3. text
    text.classList.add("show-text");

    await delay(9000);

    // HIDE (reverse)
    text.classList.add("hide");
    await delay(400);

    line.style.width = "0";
    await delay(300);

    icon.classList.add("hide");

    await delay(800);

    // reset hide states
    icon.classList.remove("hide");
    text.classList.remove("hide");
}

function delay(ms){
    return new Promise(r => setTimeout(r, ms));
}

async function runCycle(){

    for(let i=0;i<sections.length;i++){
        await showSection(sections[i]);
    }

    // 10 min pause
    await delay(600000);

    runCycle();
}

// start
setTimeout(runCycle, 2000);

</script>

</body>
</html>
