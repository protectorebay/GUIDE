<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overlay Clean</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<style>
html, body {
    margin:0;
    padding:0;
    width:1920px;
    height:1080px;
    background: transparent;
    overflow:hidden;
}

/* MAIN BLOCK */
.wrapper {
    position:absolute;
    top:40px;
    left:40px;
    width:1400px;
    color:white;
}

/* ICON */
.icon {
    font-family: Arial, sans-serif;
    font-size:18px;
    opacity:0;
    transform: translateY(-10px);
    transition: all 0.4s ease;
}

/* LINE */
.line {
    width:0;
    height:2px;
    background:white;
    margin:8px 0 12px 0;
    transition: width 0.6s ease;
}

/* TEXT */
.text {
    font-family: 'Cinzel', serif;
    font-weight:700;
    font-size:22px;
    line-height:1.35;
    letter-spacing:1.2px;
    text-transform: uppercase;

    opacity:0;
    transform: translateY(-15px);
    transition: all 0.6s ease;
}

/* STATES */
.show-icon {
    opacity:1;
    transform: translateY(0);
}

.show-line {
    width:85%; /* nie full width – bližšie k obrázku */
}

.show-text {
    opacity:1;
    transform: translateY(0);
}

.hide {
    opacity:0 !important;
    transform: translateY(-15px) !important;
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="icon" class="icon">i</div>
    <div id="line" class="line"></div>
    <div id="text" class="text"></div>
</div>

<script>

const sections = [

"TRADES PAST MINUTE SHOWS MARKET PARTICIPATION BEHIND MOVES. STRONG MOVES WITH HIGH VOLUME ARE MORE RELIABLE THAN WEAK LOW-VOLUME MOVEMENTS.",

"RSI SHOWS MARKET MOMENTUM. LOW VALUES SIGNAL OVERSOLD CONDITIONS, HIGH VALUES INDICATE OVERBOUGHT LEVELS AND POSSIBLE PULLBACK.",

"ORDER BOOK DISPLAYS REAL-TIME BUY AND SELL LIQUIDITY. LARGE ORDERS OFTEN ACT AS SHORT-TERM SUPPORT OR RESISTANCE.",

"LIQUIDITY HEATMAP HIGHLIGHTS AREAS WITH HIGH ORDER CONCENTRATION. PRICE IS OFTEN ATTRACTED TO THESE LEVELS.",

"MICROSTRUCTURE SHOWS SHORT-TERM MARKET FLOW. IT HELPS IDENTIFY WHETHER PRICE IS TRENDING OR RANGING.",

"FEAR AND GREED INDEX REFLECTS MARKET SENTIMENT. EXTREME VALUES OFTEN SIGNAL REVERSAL ZONES.",

"TREND INDICATOR DEFINES MARKET DIRECTION. TRADING WITH TREND INCREASES PROBABILITY.",

"VOLUME REPRESENTS MARKET PARTICIPATION. HIGH VOLUME CONFIRMS STRONGER AND MORE RELIABLE MOVES."

];

const icon = document.getElementById("icon");
const line = document.getElementById("line");
const text = document.getElementById("text");

function delay(ms){
    return new Promise(r => setTimeout(r, ms));
}

async function showSection(content){

    text.innerText = content;

    // reset
    icon.classList.remove("show-icon");
    line.classList.remove("show-line");
    text.classList.remove("show-text");

    await delay(200);

    // icon
    icon.classList.add("show-icon");
    await delay(400);

    // line
    line.classList.add("show-line");
    await delay(500);

    // text
    text.classList.add("show-text");
    await delay(9000);

    // hide reverse
    text.classList.add("hide");
    await delay(300);

    line.style.width = "0";
    await delay(300);

    icon.classList.add("hide");
    await delay(600);

    // cleanup
    icon.classList.remove("hide");
    text.classList.remove("hide");
}

async function runCycle(){

    for (let i = 0; i < sections.length; i++) {
        await showSection(sections[i]);
    }

    // 10 min pauza
    await delay(600000);

    runCycle();
}

setTimeout(runCycle, 2000);

</script>

</body>
</html>
